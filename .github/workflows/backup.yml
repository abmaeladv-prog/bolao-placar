name: Backup do bolao

on:
  schedule:
    - cron: '30 6 * * *'   # todo dia ~03:30 (horario de Brasilia)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Gerar backup (leve, sem imagens)
        run: python backup_bolao.py --no-receipts --keep 60
      - name: Commitar o backup no repositorio
        run: |
          git config user.name "bolao-backup[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --cached --quiet; then
            echo "Nada novo para commitar."
          else
            git commit -m "Backup automatico do bolao"
            git push
          fi
